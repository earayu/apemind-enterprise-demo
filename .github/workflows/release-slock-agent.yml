name: Release Slock Agent Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (e.g. latest, v1.0.0)'
        required: true
        default: 'latest'
  push:
    branches:
      - main
    paths:
      - 'slock-agent/**'

run-name: "Release slock-agent:${{ inputs.image_tag || 'latest' }}"

permissions:
  contents: read
  packages: write

jobs:
  image-tag:
    runs-on: ubuntu-latest
    outputs:
      tag-name: ${{ steps.tag.outputs.tag_name }}
    steps:
      - name: Determine tag
        id: tag
        run: |
          TAG="${{ inputs.image_tag || 'latest' }}"
          echo "tag_name=${TAG}" >> "$GITHUB_OUTPUT"

  release-dockerhub-aliyun:
    name: release-dockerhub-aliyun
    needs: [image-tag]
    uses: apecloud/apecloud-cd/.github/workflows/release-image-cache-sync.yml@v0.1.93
    with:
      IMG: "apecloud/slock-agent"
      VERSION: "${{ needs.image-tag.outputs.tag-name }}"
      CONTEXT: "./slock-agent"
      DOCKERFILE_PATH: "./slock-agent/Dockerfile"
      REMOVE_PREFIX: false
      APECD_REF: "v0.1.93"
    secrets: inherit

  sync-ghcr:
    name: sync-ghcr
    runs-on: ubuntu-latest
    needs: [image-tag, release-dockerhub-aliyun]
    steps:
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.PERSONAL_ACCESS_USER }}
          password: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Sync Docker Hub image to GHCR
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/apecloud/slock-agent:${{ needs.image-tag.outputs.tag-name }} \
            docker.io/apecloud/slock-agent:${{ needs.image-tag.outputs.tag-name }}
