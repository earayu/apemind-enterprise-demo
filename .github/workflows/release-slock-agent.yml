name: Release Slock Agent Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (e.g. v1.0.0 or latest)'
        required: true
        default: 'latest'
  push:
    branches:
      - main
    paths:
      - 'slock-agent/**'

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/apecloud/slock-agent
  DOCKERHUB_IMAGE: docker.io/apecloud/slock-agent
  ALIYUN_REGISTRY: registry.cn-hangzhou.aliyuncs.com
  ALIYUN_IMAGE: registry.cn-hangzhou.aliyuncs.com/apecloud/slock-agent

# Required repository secrets:
# DOCKERHUB_USERNAME, DOCKERHUB_TOKEN, ALIYUN_REGISTRY_USERNAME,
# ALIYUN_REGISTRY_PASSWORD

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Alibaba Cloud Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - uses: docker/setup-buildx-action@v3

      - name: Determine image tag
        id: tag
        run: |
          TAG="${{ inputs.image_tag || 'latest' }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: slock-agent/
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.ALIYUN_IMAGE }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
