events {
    worker_connections 1024;
}

http {
    # 允许大文件上传（500MB，覆盖所有合理场景）
    client_max_body_size 500m;
    # 上传超时：10 分钟
    client_body_timeout 600s;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_connect_timeout 60s;

    server {
        listen 3000;

        # API 请求直接转发到后端，绕过 Next.js 中间层
        # 解决 Next.js Edge Runtime 对大文件（>4MB）上传的 500 错误
        location ~ ^/api/ {
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            # 不缓冲请求体，直接流式转发（支持大文件）
            proxy_request_buffering off;
            client_max_body_size 500m;
        }

        # 健康检查端点也直接转发到后端
        location ~ ^/(health|docs|openapi.json) {
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
        }

        # 其余所有请求走 Next.js 前端
        # $http_host 保留原始端口（如 ip:3000），避免非标准端口下
        # Next.js Server Action origin 校验因 Host/Origin 端口不匹配而失败
        location / {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
